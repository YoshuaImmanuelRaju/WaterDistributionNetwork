services:
  - type: web
    name: water-network-backend
    runtime: python
    plan: free

    rootDir: backend

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port 10000

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

      - key: PORT
        value: 10000

      - key: ENV
        value: production

    autoDeploy: true